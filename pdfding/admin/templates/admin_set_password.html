{% extends 'layouts/add_box.html' %}
{% load i18n %}

{% block content %}

<div class="min-[420px]:w-sm min-[500px]:w-md">
  <h1>{% trans 'Set Password of' %}</h1>
  <div class="-mt-2! text-2xl font-bold truncate pb-4">{{ user.email }}</div>

  <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" >{% trans 'Submit' %}</button>
  </form>
</div>

{% endblock %}
